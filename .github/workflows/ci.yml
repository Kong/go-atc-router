name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string
      draft:
        description: 'Release as draft'
        required: false
        type: boolean
        default: false

jobs:
  build-native:
    name: Build ${{ matrix.variant }}
    strategy:
      matrix:
        include:
          - variant: glibc_linux_amd64
            runner: ubuntu-latest
          - variant: glibc_linux_arm64
            runner: ubuntu-24.04-arm
          - variant: darwin_arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    outputs:
      tag: ${{ steps.tag-name.outputs.tag }}
      artifact: ${{ steps.artifact-name.outputs.artifact }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout atc-router
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Kong/atc-router
          path: atc-router
      - name: Create tag name
        id: tag-name
        run: echo "tag=${{ inputs.tag == '' && 'snapshot' || inputs.tag }}" >> "$GITHUB_OUTPUT"
      - name: Create artifact name
        id: artifact-name
        run: echo "artifact=libatc_router-${{ steps.tag-name.outputs.tag }}-${{ matrix.variant }}.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Install rustup, if needed
        shell: bash
        run: |
          if ! command -v rustup &> /dev/null ; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" | sh -s -- --default-toolchain none -y
          
            echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH
          fi
      - name: rustup toolchain install ${{ inputs.toolchain }}
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
      - name: Print installed versions
        id: versions
        shell: bash
        working-directory: .
        run: |
          rustc --version --verbose
          cargo --version --verbose
          rustup --version
      - name: Build native archive
        env:
          ATC_ROUTER_VARIANT: ${{ matrix.variant }}
        run: ./scripts/build-host-library.sh
      - name: Stage native artifact
        run: |
          mkdir -p dist/${{ matrix.variant }}
          cp libatc_router_vendor/libatc_router_${{ matrix.variant }}.a dist/${{ matrix.variant }}/
          cp atc-router.h dist/${{ matrix.variant }}/
      - name: Create native artifact
        run: tar -czvf ${{ steps.artifact-name.outputs.artifact }} -C dist/${{ matrix.variant }} .
      - name: Upload native artifacts
        id: upload-native-artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.artifact-name.outputs.artifact }}
          path: ./${{ steps.artifact-name.outputs.artifact }}
          if-no-files-found: error

  build-image:
    name: Build with docker
    strategy:
      matrix:
        include:
          - variant: musl_linux_amd64
            runner: ubuntu-latest
          - variant: musl_linux_arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout atc-router
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Kong/atc-router
          path: atc-router
      - name: Create tag name
        id: tag-name
        run: echo "tag=${{ inputs.tag == '' && 'snapshot' || inputs.tag }}" >> "$GITHUB_OUTPUT"
      - name: Create artifact name
        id: artifact-name
        run: echo "artifact=libatc_router-${{ steps.tag-name.outputs.tag }}-${{ matrix.variant }}.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build musl artifact
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile.build
          push: false
          outputs: type=local,dest=./image
          build-args: |
            ARTIFACT_NAME=${{ steps.artifact-name.outputs.artifact }}
            ARCH=${{ matrix.variant }}
      - name: Upload artifacts
        id: upload-docker-artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.artifact-name.outputs.artifact }}
          path: ./image/out/${{ steps.artifact-name.outputs.artifact }}
          if-no-files-found: error

  release:
    name: Release
    needs: [ build-native, build-image ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
          persist-credentials: true
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 #v7.0.0
        with:
          merge-multiple: true
          pattern: "*.tar.gz"
      - name: Unzip artifacts
        run: |         
          for f in *.tar.gz; do tar -xzvf $f -C ./libatc_router_vendor; done
      - name: Commit and Push changes
        run: |
          # Use the official GitHub Actions bot identity
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add ./libatc_router_vendor
          # Only commit if there are actually changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated build update [skip ci]" && git push)
      - name: Create Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          artifacts: "libatc_router-*.tar.gz"
          tag: ${{ inputs.tag == '' && 'snapshot' || inputs.tag }}
          draft: ${{ inputs.draft }}
          allowUpdates: ${{ inputs.tag == '' && 'true' || inputs.draft }}