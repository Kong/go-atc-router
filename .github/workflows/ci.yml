name: Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string
      draft:
        description: 'Release as draft'
        required: false
        type: boolean
        default: false

jobs:

  build:
    name: Build
    strategy:
      matrix:
        arch: [ amd64, arm64, macos ]
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'macos-latest' }}
    outputs:
      tag: ${{ steps.tag-name.outputs.tag }}
      artifact: ${{ steps.artifact-name.outputs.artifact }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Checkout atc-router
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Kong/atc-router
          path: atc-router
      - name: Create tag name
        id: tag-name
        run: echo "tag=${{ inputs.tag == '' && 'snapshot' || inputs.tag }}" >> "$GITHUB_OUTPUT"
      - name: Create artifact name
        id: artifact-name
        run: echo "artifact=libatc_router-${{ steps.tag-name.outputs.tag }}-${{ matrix.arch }}.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Install rustup, if needed
        shell: bash
        run: |
          if ! command -v rustup &> /dev/null ; then
            curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" | sh -s -- --default-toolchain none -y
          
            echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH
          fi

      - name: rustup toolchain install ${{ inputs.toolchain }}
        env:
          toolchain: ${{ inputs.toolchain }}
        shell: bash
        run: |
          rustup toolchain install ${toolchain} --profile minimal --no-self-update

      - id: versions
        name: Print installed versions
        shell: bash
        working-directory: .
        run: |
          rustc --version --verbose
          cargo --version --verbose
          rustup --version
      - name: Build library
        run: make clean build-deps
      - name: Create artifact
        run: tar -czvf ${{ steps.artifact-name.outputs.artifact }} libatc_router.*
      - name: Upload artifacts
        id: upload-artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.artifact-name.outputs.artifact }}
          path: ./${{ steps.artifact-name.outputs.artifact }}
          if-no-files-found: error

  release:
    name: Release
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 #v7.0.0
        with:
          merge-multiple: true
          pattern: "*.tar.gz"
      - name: List artifacts
        run: ls -la
      - name: Create Release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          artifacts: "libatc_router-*.tar.gz"
          tag: ${{ needs.build.outputs.tag }}
          draft: ${{ inputs.draft }}
          allowUpdates: ${{ inputs.tag == '' && 'true' || inputs.draft }}
